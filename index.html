<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fad0c4);
  background-size: 600% 600%;
  animation: bgMove 10s ease infinite;
  color: #fff;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.box {
  margin-top: 150px;
}

h1 {
  font-size: 28px;
  animation: fadeIn 2s ease;
}

p {
  font-size: 22px;
  margin-top: 20px;
  animation: fadeIn 3s ease;
}

button {
  margin-top: 30px;
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background-color: #ff4d6d;
  color: white;
}

.no {
  background-color: #999;
  color: white;
  position: absolute;
}

button:hover {
  transform: scale(1.1);
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="box">
  <h1>မ ❤️</h1>
  <p>ကျတော်ကို အဖြေမပေးတော့ဘူးလား 🥺</p>
  <p>အဖြေတစ်ခုတော့ပေးပါနော်...</p>

  <button class="yes" onclick="yesClick()">ပေးမယ် ❤️</button>
  <button class="no" onmouseover="moveBtn()">မပေးဘူး 😝</button>
</div>

<script>
function yesClick() {
  alert("ကျေးဇူးတင်ပါတယ် မ ❤️");
}

function moveBtn() {
  const btn = document.querySelector('.no');
  btn.style.top = Math.random() * window.innerHeight + 'px';
  btn.style.left = Math.random() * window.innerWidth + 'px';
}
</script>

</body>
</html>
